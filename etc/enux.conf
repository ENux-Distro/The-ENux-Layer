# enux.conf - The ENux Layer configuration
#
# Parsed by init.c (the [init] section) and the `enux` command (the
# [layers] section). Format: [section] then `key = value` lines.
# Comments start with '#' or ';'.

[init]
# Seconds the boot menu waits before booting the default. -1 waits forever.
timeout = 5
# Default layer and init to boot, as <layer>:<command>.
default = enux:/sbin/init

[layers]
# Comma-separated boot/execution order. The first entry is the primary
# layer (what `enux exec` and `pmm` target by default). Managed by
# `enux set-exec-order` and updated automatically on install/remove.
exec_order = enux
# The active layer.
active = enux
